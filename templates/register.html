{% extends "base.html" %}
{% block title %}Register - CareConnect{% endblock %}
{% block content %}
<section class="auth-shell">
    <form class="auth-card" method="post">
        <div class="auth-logo">+</div>
        <p class="eyebrow">Create your account</p>
        <h1 data-i18n="register">Register</h1>
        <label data-i18n="name">Name</label>
        <input type="text" name="name" required>
        <label data-i18n="email">Email</label>
        <input type="email" name="email" required>
        <label data-i18n="password">Password</label>
        <input type="password" name="password" minlength="6" required>
        <label data-i18n="confirm_password">Confirm Password</label>
        <input type="password" name="confirm_password" minlength="6" required>
        <button class="btn full" type="submit" data-i18n="register">Register</button>
        <p><span data-i18n="have_account">Already have an account?</span> <a href="{{ url_for('login') }}" data-i18n="login">Login</a></p>
        <select id="languageSelect" class="language-select centered" aria-label="Language">
            <option value="en">English</option>
            <option value="kn">ಕನ್ನಡ</option>
        </select>
    </form>
</section>
{% endblock %}
